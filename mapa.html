<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa-múndi</title>
  <link rel="stylesheet" href="mapa.css" />
</head>
<body>
  <div class="topbar">
    <a href="index.html">← Voltar</a>
    <button id="toggleProjection" type="button" aria-pressed="false">Visual esférico: off</button>
  </div>

  <aside class="poi-sidebar" aria-label="Pontos de interesse">
    <h2>Pontos de interesse</h2>

    <input id="poiSearch" class="poi-search" type="search" placeholder="Buscar localização..." aria-label="Buscar localização" />

    <div class="poi-switches">
      <label>
        <input id="togglePins" type="checkbox" checked />
        Mostrar pins
      </label>
      <label>
        <input id="toggleIcons" type="checkbox" checked />
        Mostrar ícones
      </label>
      <label>
        <input id="toggleNames" type="checkbox" checked />
        Mostrar nomes
      </label>
    </div>

    <ul id="poiList" class="poi-list"></ul>
  </aside>

  <div class="zoom-control" aria-label="Controle de zoom">
    <span class="zoom-label" id="zoomValue">100%</span>
    <div id="zoomTrack" class="zoom-track" role="slider" aria-valuemin="20" aria-valuemax="300" aria-valuenow="100" tabindex="0" aria-label="Zoom do mapa">
      <div id="zoomThumb" class="zoom-thumb"></div>
    </div>
  </div>

  <div id="mapCanvas" aria-label="Mapa-múndi em tela cheia">
    <div id="poiLayer" class="poi-layer" aria-hidden="true"></div>
  </div>

  <div id="poiModalBackdrop" class="poi-modal-backdrop" aria-hidden="true">
    <article class="poi-modal" role="dialog" aria-modal="true" aria-labelledby="poiModalTitle">
      <div class="poi-modal-layout">
        <div class="poi-modal-main">
          <header class="poi-modal-header">
            <button id="poiModalClose" class="poi-modal-close" type="button">Fechar</button>
          </header>

          <section id="tabPanelFotos" class="poi-tab-panel" data-tab="fotos" aria-hidden="true">
            <div id="poiCarousel" class="poi-carousel"></div>
            <div id="poiCarouselThumbs" class="poi-carousel-thumbs"></div>
          </section>

          <section id="tabPanelInfo" class="poi-tab-panel" data-tab="info" aria-hidden="false">
            <div class="poi-modal-info">
              <h3 id="poiModalTitle">POI</h3>
              <small id="poiModalMeta"></small>
            </div>
            <div id="poiDescription" class="poi-description"></div>
          </section>

          <section id="tabPanelPersonagens" class="poi-tab-panel" data-tab="personagens" aria-hidden="true">
            <p class="poi-tab-placeholder">Personagens (placeholder)</p>
          </section>

          <section id="tabPanelLojas" class="poi-tab-panel" data-tab="lojas" aria-hidden="true">
            <p class="poi-tab-placeholder">Lojas (placeholder)</p>
          </section>
        </div>

        <nav id="poiTabMenu" class="poi-tab-menu" aria-label="Seções do POI"></nav>
      </div>
    </article>
  </div>

  <div id="imageModalBackdrop" class="image-modal-backdrop" aria-hidden="true">
    <article class="image-modal" role="dialog" aria-modal="true">
      <button id="imageModalClose" class="poi-modal-close" type="button">Fechar imagem</button>
      <img id="imageModalImage" alt="Imagem expandida do POI" />
    </article>
  </div>

  <script>
    const mapCanvas = document.getElementById('mapCanvas');
    const zoomTrack = document.getElementById('zoomTrack');
    const zoomThumb = document.getElementById('zoomThumb');
    const zoomValue = document.getElementById('zoomValue');
    const poiLayer = document.getElementById('poiLayer');
    const poiList = document.getElementById('poiList');
    const togglePins = document.getElementById('togglePins');
    const toggleIcons = document.getElementById('toggleIcons');
    const toggleNames = document.getElementById('toggleNames');
    const poiSearch = document.getElementById('poiSearch');
    const poiModalBackdrop = document.getElementById('poiModalBackdrop');
    const poiModalClose = document.getElementById('poiModalClose');
    const poiModalTitle = document.getElementById('poiModalTitle');
    const poiModalMeta = document.getElementById('poiModalMeta');
    const poiCarousel = document.getElementById('poiCarousel');
    const poiCarouselThumbs = document.getElementById('poiCarouselThumbs');
    const poiDescription = document.getElementById('poiDescription');
    const poiTabMenu = document.getElementById('poiTabMenu');
    const imageModalBackdrop = document.getElementById('imageModalBackdrop');
    const imageModalImage = document.getElementById('imageModalImage');
    const imageModalClose = document.getElementById('imageModalClose');
    const toggleProjection = document.getElementById('toggleProjection');

    const POI_MODAL_TABS = [
      { id: 'fotos', label: 'Fotos', icon: 'photos' },
      { id: 'info', label: 'Info', icon: 'info' },
      { id: 'personagens', label: 'Personagens', icon: 'characters' },
      { id: 'lojas', label: 'Lojas', icon: 'stores' }
    ];

    let activePoiTab = 'info';

    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let zoom = 1;
    let naturalWidth = 0;
    let naturalHeight = 0;
    let locations = [];
    let typeConfig = {};
    let iconSeed = 20260411;
    let iconSizePx = 110;
    const markerCache = new Map();
    const VIEW_STATE_KEY = 'mapa_view_state_v1';
    const SPHERICAL_VIEW_KEY = 'mapa_spherical_view_v1';

    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 3;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function zoomToRatio() {
      return (zoom - MIN_ZOOM) / (MAX_ZOOM - MIN_ZOOM);
    }

    function applyProjectionButtonState() {
      const enabled = document.body.classList.contains('is-spherical');
      toggleProjection.setAttribute('aria-pressed', String(enabled));
      toggleProjection.textContent = `Visual esférico: ${enabled ? 'on' : 'off'}`;
    }

    function setSphericalProjection(enabled) {
      document.body.classList.toggle('is-spherical', Boolean(enabled));
      applyProjectionButtonState();
      try {
        localStorage.setItem(SPHERICAL_VIEW_KEY, enabled ? '1' : '0');
      } catch {}
    }

    function restoreSphericalProjection() {
      try {
        const saved = localStorage.getItem(SPHERICAL_VIEW_KEY);
        setSphericalProjection(saved === '1');
        return;
      } catch {}
      setSphericalProjection(false);
    }

    function normalizeType(type) {
      return String(type || '').trim().toLowerCase();
    }

    function getTypeColor(type) {
      const target = normalizeType(type);
      const matched = Object.entries(typeConfig).find(([name]) => normalizeType(name) === target);
      return matched ? matched[1].color : '#7f7f7f';
    }

    function hexToRgb(hexColor) {
      const hex = String(hexColor || '').replace('#', '').trim();
      if (!/^[0-9a-fA-F]{3,8}$/.test(hex)) return null;
      const normalized = hex.length === 3
        ? hex.split('').map((char) => `${char}${char}`).join('')
        : hex.slice(0, 6);
      const value = Number.parseInt(normalized, 16);
      if (!Number.isFinite(value)) return null;
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    }

    function getSoftLabelColor(type) {
      const rgb = hexToRgb(getTypeColor(type));
      if (!rgb) return '#e8e8e8';
      const mix = 0.74;
      const r = Math.round(rgb.r + ((255 - rgb.r) * mix));
      const g = Math.round(rgb.g + ((255 - rgb.g) * mix));
      const b = Math.round(rgb.b + ((255 - rgb.b) * mix));
      return `rgb(${r}, ${g}, ${b})`;
    }

    function getTypeStyle(type) {
      const target = normalizeType(type);
      const matched = Object.entries(typeConfig).find(([name]) => normalizeType(name) === target);
      return matched?.[1]?.label_style || {};
    }

    function getTypeDefaults(type) {
      const target = normalizeType(type);
      const matched = Object.entries(typeConfig).find(([name]) => normalizeType(name) === target);
      return matched?.[1] || {};
    }

    function positiveModulo(value, base) {
      return ((value % base) + base) % base;
    }

    function hashStringToInt(input) {
      let hash = 2166136261;
      for (const char of String(input || '')) {
        hash ^= char.charCodeAt(0);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function getTypeIconSet(type) {
      const defaults = getTypeDefaults(type);
      return Array.isArray(defaults.icons) ? defaults.icons : [];
    }

    function getLocationIcon(location) {
      if (location.icon_override) return String(location.icon_override);
      const icons = getTypeIconSet(location.type);
      if (!icons.length) return '';

      if (location.random_icon) return location.random_icon;
      const offset = Number(location.icon_index_offset || 0);
      const baseHash = hashStringToInt(`${iconSeed}:${location.type}:${location.id}:${location.name}`);
      const seededIndex = baseHash % icons.length;
      const finalIndex = positiveModulo(seededIndex + offset, icons.length);
      return icons[finalIndex];
    }

    function getIconSize() {
      const baseSize = Math.max(10, Number(iconSizePx || 110));
      return Math.max(8, baseSize * zoom);
    }

    function applyIconLayout(iconElement) {
      iconElement.style.width = `${getIconSize()}px`;
      iconElement.style.height = `${getIconSize()}px`;
      iconElement.style.top = '0px';
    }

    function getPinOffsetFromIconAnchor() {
      return 50 * zoom;
    }

    function applyMarkerAnchors(markerElement) {
      const pinOffset = getPinOffsetFromIconAnchor();
      const labelExtraOffset = 14 * zoom;

      const pin = markerElement.querySelector('.poi-pin');
      if (pin) {
        pin.style.top = `${-pinOffset}px`;
      }

      const name = markerElement.querySelector('.poi-name');
      if (name) {
        name.style.top = `${-(pinOffset + labelExtraOffset)}px`;
      }
    }

    function applyLabelStyle(labelElement, type) {
      const style = getTypeStyle(type);
      const baseSizePt = 10;
      const sizeOffset = Number(style.size_offset_pt || 0);
      labelElement.style.fontSize = `${Math.max(6, baseSizePt + sizeOffset)}pt`;
      labelElement.style.fontWeight = style.bold === false ? '500' : '700';
      labelElement.style.fontStyle = style.italic ? 'italic' : 'normal';
      labelElement.style.color = getSoftLabelColor(type);
    }

    async function loadTypeConfig() {
      try {
        const response = await fetch('data/poi-config.json');
        if (!response.ok) throw new Error('Falha no carregamento de data/poi-config.json');
        const configData = await response.json();
        typeConfig = configData.types || {};
        iconSeed = Number(configData.icon_seed || 20260411);
        iconSizePx = Number(configData.icon_size_px || 110);
      } catch (error) {
        console.warn('Usando configuração padrão de tipos.', error);
        iconSeed = 20260411;
        iconSizePx = 110;
        typeConfig = {
          Cidade: { color: '#dd6f43', icons: ['Icon/Cidade/icon_1.png'] },
          Vila: { color: '#5f9ea0', icons: ['Icon/Vila/icon_1.png'] },
          Acontecimento: { color: '#d3b45d', icons: ['Icon/Acontecimento/icon_1.png'] }
        };
      }
    }

    function getFilteredLocations() {
      const filter = poiSearch.value.trim().toLowerCase();
      if (!filter) return locations;

      return locations.filter((location) => {
        const fullText = `${location.name} ${location.type} ${location.description || ''}`.toLowerCase();
        return fullText.includes(filter);
      });
    }

    function buildSearchMeta(location) {
      const filter = poiSearch.value.trim().toLowerCase();
      if (!filter) return String(location.type || '');

      const description = String(location.description || '');
      const haystack = description.toLowerCase();
      const index = haystack.indexOf(filter);
      if (index < 0) return String(location.type || '');

      const radius = 26;
      const start = Math.max(0, index - radius);
      const end = Math.min(description.length, index + filter.length + radius);
      const snippet = description.slice(start, end).replace(/\s+/g, ' ').trim();
      const prefix = start > 0 ? '... ' : '';
      const suffix = end < description.length ? ' ...' : '';
      return `${prefix}${snippet}${suffix} - ${location.type}`;
    }

    function renderZoomThumb() {
      const trackHeight = zoomTrack.clientHeight;
      const thumbHeight = zoomThumb.clientHeight;
      const ratio = zoomToRatio();
      const travel = trackHeight - thumbHeight;
      const top = (1 - ratio) * travel;

      zoomThumb.style.top = `${top}px`;
      zoomValue.textContent = `${Math.round(zoom * 100)}%`;
      zoomTrack.setAttribute('aria-valuenow', String(Math.round(zoom * 100)));
    }

    function applyZoom() {
      if (naturalWidth && naturalHeight) {
        mapCanvas.style.backgroundSize = `${naturalWidth * zoom}px ${naturalHeight * zoom}px`;
      } else {
        mapCanvas.style.backgroundSize = `${zoom * 100}% auto`;
      }
      renderZoomThumb();
      renderPOI();
    }

    function render() {
      mapCanvas.style.backgroundPosition = `${offsetX}px ${offsetY}px`;
      renderPOI();
      persistViewState();
    }

    function resetPosition() {
      offsetX = 0;
      offsetY = 0;
      render();
    }

    function persistViewState() {
      try {
        localStorage.setItem(VIEW_STATE_KEY, JSON.stringify({ offsetX, offsetY, zoom }));
      } catch {}
    }

    function restoreViewState() {
      try {
        const raw = localStorage.getItem(VIEW_STATE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (!Number.isFinite(parsed?.offsetX) || !Number.isFinite(parsed?.offsetY) || !Number.isFinite(parsed?.zoom)) {
          return false;
        }
        offsetX = Number(parsed.offsetX);
        offsetY = Number(parsed.offsetY);
        zoom = clamp(Number(parsed.zoom), MIN_ZOOM, MAX_ZOOM);
        return true;
      } catch {
        return false;
      }
    }

    function focusLocation(location) {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      offsetX = centerX - (location.x * zoom);
      offsetY = centerY - (location.y * zoom);
      render();
    }

    function setZoomFromPercent(percent) {
      const nextZoom = clamp(percent / 100, MIN_ZOOM, MAX_ZOOM);
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      const worldXAtCenter = (centerX - offsetX) / zoom;
      const worldYAtCenter = (centerY - offsetY) / zoom;

      zoom = nextZoom;
      offsetX = centerX - (worldXAtCenter * zoom);
      offsetY = centerY - (worldYAtCenter * zoom);

      applyZoom();
      render();
    }

    function setZoomFromPointer(clientY) {
      const rect = zoomTrack.getBoundingClientRect();
      const ratio = clamp((rect.bottom - clientY) / rect.height, 0, 1);
      const percent = 20 + ratio * 280;
      setZoomFromPercent(percent);
    }

    function setZoomFromWheel(deltaY, clientX, clientY) {
      const zoomStep = 0.06;
      const direction = deltaY > 0 ? -1 : 1;
      const nextZoom = clamp(zoom + (direction * zoomStep), MIN_ZOOM, MAX_ZOOM);
      if (nextZoom === zoom) return;

      const worldXAtPointer = (clientX - offsetX) / zoom;
      const worldYAtPointer = (clientY - offsetY) / zoom;

      zoom = nextZoom;
      offsetX = clientX - (worldXAtPointer * zoom);
      offsetY = clientY - (worldYAtPointer * zoom);

      applyZoom();
      render();
    }

    function createLocationElement(location) {
      const element = document.createElement('article');
      element.className = 'poi-item';
      element.dataset.id = location.id;
      element.title = `${location.name} (${location.type})`;

      const color = getTypeColor(location.type);
      element.style.setProperty('--poi-color', color);

      const showPin = togglePins.checked && location.show_pin;
      const showIcon = toggleIcons.checked && location.show_icon;
      const showName = toggleNames.checked && location.show_name;

      if (showPin) {
        const pin = document.createElement('span');
        pin.className = 'poi-pin';
        element.appendChild(pin);

        const iconSrc = showIcon ? getLocationIcon(location) : '';
        if (iconSrc) {
          const icon = document.createElement('img');
          icon.className = 'poi-pin-icon';
          icon.src = iconSrc;
          icon.alt = `Ícone de ${location.type}`;
          icon.loading = 'lazy';
          applyIconLayout(icon);
          icon.addEventListener('error', () => icon.remove());
          element.appendChild(icon);
        }
      }

      if (showName) {
        const label = document.createElement('span');
        label.className = 'poi-name';
        label.textContent = location.name;
        applyLabelStyle(label, location.type);
        element.appendChild(label);
      }

      if (!showPin && !showName) {
        element.classList.add('is-hidden');
      }

      element.addEventListener('click', () => openPoiModal(location));
      element.addEventListener('mouseenter', () => element.classList.add('is-hovered'));
      element.addEventListener('mouseleave', () => element.classList.remove('is-hovered'));
      applyMarkerAnchors(element);

      return element;
    }

    function getMarkerSignature(location) {
      return [
        togglePins.checked,
        toggleIcons.checked,
        toggleNames.checked,
        location.show_pin,
        location.show_icon,
        location.show_name,
        location.type,
        location.name
      ].join('|');
    }

    function getMapTileSizePx() {
      const width = naturalWidth > 0 ? naturalWidth * zoom : (mapCanvas.clientWidth || window.innerWidth);
      return { width };
    }

    function wrapToViewport(rawPosition, tileSize, viewportCenter) {
      if (!Number.isFinite(tileSize) || tileSize <= 0) return rawPosition;

      let wrapped = positiveModulo(rawPosition, tileSize);
      wrapped += Math.round((viewportCenter - wrapped) / tileSize) * tileSize;
      return wrapped;
    }

    function renderPOI() {
      const visibleLocations = getFilteredLocations();
      const visibleIds = new Set(visibleLocations.map((location) => location.id));

      locations.forEach((location) => {
        const cachedMarker = markerCache.get(location.id);
        if (cachedMarker && !visibleIds.has(location.id)) {
          cachedMarker.style.display = 'none';
        }
      });

      visibleLocations.forEach((location) => {
        const signature = getMarkerSignature(location);
        let marker = markerCache.get(location.id);

        if (!marker || marker.dataset.signature !== signature) {
          const nextMarker = createLocationElement(location);
          nextMarker.dataset.signature = signature;
          if (marker) {
            marker.replaceWith(nextMarker);
          } else {
            poiLayer.appendChild(nextMarker);
          }
          marker = nextMarker;
          markerCache.set(location.id, marker);
        }

        const tileSize = getMapTileSizePx();
        const rawX = offsetX + location.x * zoom;
        const rawY = offsetY + location.y * zoom;
        const wrappedX = wrapToViewport(rawX, tileSize.width, window.innerWidth / 2);
        const wrappedY = rawY;

        marker.style.display = '';
        marker.style.left = `${wrappedX}px`;
        marker.style.top = `${wrappedY}px`;

        const pinIcon = marker.querySelector('.poi-pin-icon');
        if (pinIcon) {
          applyIconLayout(pinIcon);
        }
        applyMarkerAnchors(marker);
      });
    }

    function renderPOIList() {
      poiList.innerHTML = '';

      getFilteredLocations().forEach((location) => {
        const item = document.createElement('li');
        item.className = 'poi-entry';
        item.tabIndex = 0;
        item.setAttribute('role', 'button');
        item.style.setProperty('--poi-color', getTypeColor(location.type));
        const iconSrc = toggleIcons.checked ? getLocationIcon(location) : '';
        const iconMarkup = iconSrc
          ? `<img class="poi-entry-icon" src="${iconSrc}" alt="Ícone de ${location.type}" />`
          : '<span class="poi-entry-icon is-empty" aria-hidden="true"></span>';
        item.innerHTML = `
          <div class="poi-entry-top">
            ${iconMarkup}
            <div class="poi-entry-text">
              <strong>${location.name}</strong>
              <span class="poi-entry-type"></span>
            </div>
          </div>
        `;
        const meta = item.querySelector('.poi-entry-type');
        if (meta) meta.textContent = buildSearchMeta(location);
        const thumb = item.querySelector('.poi-entry-icon');
        if (thumb && thumb.tagName === 'IMG') {
          thumb.addEventListener('error', () => {
            const fallback = document.createElement('span');
            fallback.className = 'poi-entry-icon is-empty';
            fallback.setAttribute('aria-hidden', 'true');
            thumb.replaceWith(fallback);
          });
        }

        item.addEventListener('click', () => focusLocation(location));
        item.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            focusLocation(location);
          }
        });

        poiList.appendChild(item);
      });
    }

    async function discoverLocationFiles() {
      const discovered = new Set();

      try {
        const response = await fetch('data/locations/');
        if (!response.ok) throw new Error('Sem listagem HTTP da pasta.');

        const html = await response.text();
        const hrefMatches = html.match(/href\s*=\s*["']([^"']+)["']/gi) || [];

        hrefMatches.forEach((rawHref) => {
          const href = rawHref.replace(/href\s*=\s*["']|["']/gi, '');
          const cleanHref = href.split('?')[0].split('#')[0];
          const fileName = decodeURIComponent(cleanHref.split('/').pop() || '');
          if (fileName.endsWith('.json') && fileName !== 'index.json') {
            discovered.add(fileName);
          }
        });
      } catch (error) {
        console.debug('Varredura direta indisponível, usando fallback index.json:', error);
      }

      try {
        const fallbackResponse = await fetch('data/locations/index.json');
        const fallbackFiles = await fallbackResponse.json();
        fallbackFiles.forEach((fileName) => {
          if (String(fileName).endsWith('.json')) discovered.add(String(fileName));
        });
      } catch (error) {
        console.debug('Fallback index.json indisponível:', error);
      }

      return [...discovered].sort();
    }

    async function loadLocations() {
      const files = await discoverLocationFiles();
      if (!files.length) {
        locations = [];
        renderPOIList();
        renderPOI();
        poiList.innerHTML = '<li>Nenhum arquivo JSON encontrado em data/locations.</li>';
        return;
      }

      const entries = await Promise.all(files.map(async (fileName) => {
        const fileResponse = await fetch(`data/locations/${fileName}`);
        const data = await fileResponse.json();
        const type = String(data.type || 'desconhecido');
        const defaults = getTypeDefaults(type);

        return {
          id: fileName,
          x: Number(data.x || 0),
          y: Number(data.y || 0),
          name: String(data.name || 'Sem nome'),
          type,
          show_pin: typeof data.show_pin === 'boolean' ? data.show_pin : defaults.show_pin_default !== false,
          show_icon: typeof data.show_icon === 'boolean' ? data.show_icon : defaults.show_icon_default !== false,
          show_name: typeof data.show_name === 'boolean' ? data.show_name : defaults.show_name_default !== false,
          description: String(data.description || ''),
          image_prefix: String(data.image_prefix || slugFromName(data.name || fileName.replace('.json', ''))),
          images: Array.isArray(data.images) ? data.images : [],
          icon_index_offset: Number(data.icon_index_offset || 0),
          icon_override: String(data.icon_override || ''),
          random_icon: (() => {
            const icons = getTypeIconSet(type);
            if (!icons.length) return '';
            return icons[Math.floor(Math.random() * icons.length)];
          })()
        };
      }));

      locations = entries;
      markerCache.clear();
      poiLayer.innerHTML = '';
      renderPOIList();
      renderPOI();
    }

    function slugFromName(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    async function discoverPoiImages(prefix) {
      if (!prefix) return [];

      if (prefix.startsWith('http') || prefix.includes('/')) {
        return [prefix];
      }

      if (prefix.includes('.')) {
        return [`data/locations/images/${prefix}`];
      }

      const fromJson = locations.find((loc) => loc.image_prefix === prefix)?.images || [];
      const explicit = fromJson.map((name) => `data/locations/images/${name}`);
      if (explicit.length) return explicit;

      try {
        const response = await fetch('data/locations/images/');
        const html = await response.text();
        const hrefMatches = html.match(/href\\s*=\\s*[\"']([^\"']+)[\"']/gi) || [];
        const candidates = hrefMatches
          .map((rawHref) => rawHref.replace(/href\\s*=\\s*[\"']|[\"']/gi, ''))
          .map((href) => decodeURIComponent(href.split('?')[0].split('#')[0].split('/').pop() || ''))
          .filter((fileName) => fileName.startsWith(`${prefix}_image_`))
          .filter((fileName) => /(png|jpg|jpeg|gif|webp)$/i.test(fileName))
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        return candidates.map((fileName) => `data/locations/images/${fileName}`);
      } catch {
        return [];
      }
    }

    function buildTabIcon(kind) {
      const variants = {
        photos: 'M3 6h4l2-2h6a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2zm4 4a3 3 0 1 0 6 0 3 3 0 0 0-6 0z',
        info: 'M9 2a7 7 0 1 1 0 14A7 7 0 0 1 9 2zm0 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-1 4h2v4H8V9z',
        characters: 'M9 3a3 3 0 1 1 0 6 3 3 0 0 1 0-6zM3 15a6 6 0 0 1 12 0v1H3v-1z',
        stores: 'M2 7l2-4h10l2 4v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7zm2 4h10v5H4v-5z'
      };
      return variants[kind] || variants.info;
    }

    function setActivePoiTab(tabId) {
      activePoiTab = tabId;
      document.querySelectorAll('.poi-tab-panel').forEach((panel) => {
        const isActive = panel.dataset.tab === tabId;
        panel.classList.toggle('is-active', isActive);
        panel.setAttribute('aria-hidden', String(!isActive));
      });

      [...poiTabMenu.children].forEach((button) => {
        const isActive = button.dataset.tabId === tabId;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function renderPoiTabMenu() {
      poiTabMenu.innerHTML = '';
      POI_MODAL_TABS.forEach((tab) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'poi-tab-btn';
        button.dataset.tabId = tab.id;
        button.title = tab.label;
        button.setAttribute('aria-label', tab.label);
        button.innerHTML = `<svg viewBox="0 0 18 18" aria-hidden="true"><path d="${buildTabIcon(tab.icon)}"></path></svg>`;
        button.addEventListener('click', () => setActivePoiTab(tab.id));
        poiTabMenu.appendChild(button);
      });
      setActivePoiTab(activePoiTab);
    }

    async function openPoiModal(location) {
      poiModalTitle.textContent = location.name;
      poiModalMeta.textContent = `${location.type} · X: ${location.x} · Y: ${location.y}`;
      poiDescription.textContent = location.description || 'Sem descrição.';

      const images = await discoverPoiImages(location.image_prefix);
      renderCarousel(images);
      setActivePoiTab('info');

      poiModalBackdrop.classList.add('visible');
      poiModalBackdrop.setAttribute('aria-hidden', 'false');
    }

    function renderCarousel(images) {
      poiCarousel.innerHTML = '';
      poiCarouselThumbs.innerHTML = '';
      if (!images.length) {
        poiCarousel.classList.add('is-empty');
        poiCarouselThumbs.classList.add('is-empty');
        return;
      }

      poiCarousel.classList.remove('is-empty');
      poiCarouselThumbs.classList.remove('is-empty');

      let activeIndex = 0;
      const image = document.createElement('img');
      image.src = images[activeIndex];
      image.alt = 'Imagem do POI';
      image.addEventListener('click', () => openImageModal(images[activeIndex]));

      const prev = document.createElement('button');
      prev.className = 'poi-carousel-nav prev';
      prev.type = 'button';
      prev.textContent = '‹';
      prev.addEventListener('click', () => {
        activeIndex = (activeIndex - 1 + images.length) % images.length;
        image.src = images[activeIndex];
      });

      const next = document.createElement('button');
      next.className = 'poi-carousel-nav next';
      next.type = 'button';
      next.textContent = '›';
      next.addEventListener('click', () => {
        activeIndex = (activeIndex + 1) % images.length;
        image.src = images[activeIndex];
        renderThumbState();
      });

      poiCarousel.appendChild(image);
      if (images.length > 1) {
        poiCarousel.appendChild(prev);
        poiCarousel.appendChild(next);
      }

      function renderThumbState() {
        [...poiCarouselThumbs.children].forEach((button, index) => {
          button.classList.toggle('active', index === activeIndex);
        });
      }

      images.forEach((src, index) => {
        const thumbButton = document.createElement('button');
        thumbButton.type = 'button';
        const thumb = document.createElement('img');
        thumb.src = src;
        thumb.alt = `Imagem ${index + 1}`;
        thumbButton.appendChild(thumb);
        thumbButton.addEventListener('click', () => {
          activeIndex = index;
          image.src = images[activeIndex];
          renderThumbState();
        });
        poiCarouselThumbs.appendChild(thumbButton);
      });

      renderThumbState();
    }

    function openImageModal(src) {
      imageModalImage.src = src;
      imageModalBackdrop.classList.add('visible');
      imageModalBackdrop.setAttribute('aria-hidden', 'false');
    }

    function closePoiModal() {
      poiModalBackdrop.classList.remove('visible');
      poiModalBackdrop.setAttribute('aria-hidden', 'true');
    }

    function closeImageModal() {
      imageModalBackdrop.classList.remove('visible');
      imageModalBackdrop.setAttribute('aria-hidden', 'true');
      imageModalImage.removeAttribute('src');
    }

    mapCanvas.addEventListener('mousedown', (event) => {
      dragging = true;
      mapCanvas.classList.add('dragging');
      lastX = event.clientX;
      lastY = event.clientY;
    });

    window.addEventListener('mousemove', (event) => {
      if (!dragging) return;

      const deltaX = event.clientX - lastX;
      const deltaY = event.clientY - lastY;

      offsetX += deltaX;
      offsetY += deltaY;

      lastX = event.clientX;
      lastY = event.clientY;

      render();
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      mapCanvas.classList.remove('dragging');
    });

    mapCanvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      setZoomFromWheel(event.deltaY, event.clientX, event.clientY);
    }, { passive: false });

    mapCanvas.addEventListener('touchstart', (event) => {
      if (!event.touches.length) return;
      const touch = event.touches[0];
      dragging = true;
      lastX = touch.clientX;
      lastY = touch.clientY;
    }, { passive: true });

    mapCanvas.addEventListener('touchmove', (event) => {
      if (!dragging || !event.touches.length) return;
      const touch = event.touches[0];
      const deltaX = touch.clientX - lastX;
      const deltaY = touch.clientY - lastY;

      offsetX += deltaX;
      offsetY += deltaY;
      lastX = touch.clientX;
      lastY = touch.clientY;
      render();
    }, { passive: true });

    mapCanvas.addEventListener('touchend', () => {
      dragging = false;
    }, { passive: true });

    let zoomDragging = false;

    zoomTrack.addEventListener('mousedown', (event) => {
      zoomDragging = true;
      setZoomFromPointer(event.clientY);
    });

    window.addEventListener('mousemove', (event) => {
      if (!zoomDragging) return;
      setZoomFromPointer(event.clientY);
    });

    window.addEventListener('mouseup', () => {
      zoomDragging = false;
    });

    zoomTrack.addEventListener('touchstart', (event) => {
      if (!event.touches.length) return;
      zoomDragging = true;
      setZoomFromPointer(event.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('touchmove', (event) => {
      if (!zoomDragging || !event.touches.length) return;
      setZoomFromPointer(event.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('touchend', () => {
      zoomDragging = false;
    }, { passive: true });

    zoomTrack.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowUp' || event.key === 'ArrowRight') {
        setZoomFromPercent((zoom * 100) + 2);
        event.preventDefault();
      } else if (event.key === 'ArrowDown' || event.key === 'ArrowLeft') {
        setZoomFromPercent((zoom * 100) - 2);
        event.preventDefault();
      }
    });

    poiSearch.addEventListener('input', () => {
      renderPOIList();
      renderPOI();
    });

    togglePins.addEventListener('change', renderPOI);
    toggleIcons.addEventListener('change', () => {
      renderPOI();
      renderPOIList();
    });
    toggleNames.addEventListener('change', renderPOI);
    toggleProjection.addEventListener('click', () => {
      const enabled = document.body.classList.contains('is-spherical');
      setSphericalProjection(!enabled);
    });
    poiModalClose.addEventListener('click', closePoiModal);
    imageModalClose.addEventListener('click', closeImageModal);
    poiModalBackdrop.addEventListener('click', (event) => {
      if (event.target === poiModalBackdrop) closePoiModal();
    });
    imageModalBackdrop.addEventListener('click', (event) => {
      if (event.target === imageModalBackdrop) closeImageModal();
    });
    const mapImage = new Image();
    mapImage.onload = () => {
      naturalWidth = mapImage.naturalWidth;
      naturalHeight = mapImage.naturalHeight;
      restoreViewState();
      applyZoom();
    };
    mapImage.onerror = () => {
      console.warn('Não foi possível carregar world_map_telarium.png para medir o tile; usando fallback de viewport.');
      restoreViewState();
      applyZoom();
    };
    mapImage.src = 'world_map_telarium.png';

    renderPoiTabMenu();
    restoreSphericalProjection();
    resetPosition();
    applyZoom();
    loadTypeConfig()
      .then(() => loadLocations())
      .catch((error) => {
        console.error('Erro ao carregar pontos de interesse:', error);
        poiList.innerHTML = '<li>Não foi possível carregar os pontos de interesse.</li>';
      });
  </script>
</body>
</html>
