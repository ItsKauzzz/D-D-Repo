<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RPG Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      margin-top: 100px;
    }

    button,
    .map-link {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin: 6px;
    }

    .map-link {
      background: #2c7be5;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>RPG Tool Test</h1>
  <p id="result">Clique para rolar 1d20</p>
  <button onclick="roll()">Roll</button>
  <a class="map-link" href="mapa.html">Abrir mapa-múndi (tela cheia)</a>

  <script>
    function roll() {
      const value = Math.floor(Math.random() * 20) + 1;
      document.getElementById('result').innerText = 'Resultado: ' + value;
    }
  </script>

</body>
</html>
