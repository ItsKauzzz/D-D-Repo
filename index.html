<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RPG Test</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #eee;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>RPG Tool Test</h1>
  <p id="result">Clique para rolar 1d20</p>
  <button onclick="roll()">Roll</button>

  <script>
    function roll() {
      const value = Math.floor(Math.random() * 20) + 1;
      document.getElementById("result").innerText = "Resultado: " + value;
    }
  </script>

</body>
</html>
